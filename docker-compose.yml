version: '3.8'

services:
  app:
    build: .
    container_name: matsedel-app
    volumes:
      - db-data:/app/data
    networks:
      - matsedel-net

  nginx:
    image: nginx:alpine
    container_name: matsedel-nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
    depends_on:
      - app
    networks:
      - matsedel-net

volumes:
  db-data:

networks:
  matsedel-net:
    driver: bridge
