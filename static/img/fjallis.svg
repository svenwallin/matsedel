  <path d="M550 470 L600 430 L650 470" fill="#2d5a86"/>
  <rect x="560" y="545" width="80" height="95" rx="16" fill="#2d5a86"/>
  <rect x="570" y="640" width="20" height="70" rx="8" fill="#3c3c3c"/>
  <rect x="610" y="640" width="20" height="70" rx="8" fill="#3c3c3c"/>
  <rect x="536" y="558" width="24" height="16" rx="6" fill="#2d5a86"/>
  <rect x="640" y="558" width="24" height="16" rx="6" fill="#2d5a86"/>

